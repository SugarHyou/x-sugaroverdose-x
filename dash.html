<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>† OVERDOSE ADMIN PANEL †</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #ffccf2; padding: 20px; font-family: sans-serif; }
        .dash-container { width: 100%; max-width: 400px; margin: 0 auto; border: 4px solid #000; background: #fff; }
        .window-title { background: #ff0055; color: white; padding: 8px; font-weight: 900; border-bottom: 4px solid #000; }
        .window-body { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        .section-box { border: 3px solid #000; padding: 10px; background: #f9f9f9; }
        label { display: block; font-weight: 900; margin-bottom: 5px; font-size: 0.8rem; }
        
        .slider-wrap { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; accent-color: #ff0055; }
        
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        button { cursor: pointer; border: 2px outset #fff; background: #eee; font-weight: bold; padding: 8px; }
        button:hover { background: #ddd; border: 2px inset #000; }
        
        input[type="text"], textarea { width: 100%; border: 2px solid #000; padding: 8px; box-sizing: border-box; }
        #submit-btn { background: #00ffcc; border: 3px solid #000; font-weight: 900; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="window dash-container">
        <div class="window-title">† Broadcast Console.exe †</div>
        <div class="window-body">
            
            <div class="section-box">
                <label style="color: red;">STRESS</label>
                <div class="slider-wrap">
                    <input type="range" id="stat-stress" min="0" max="100" value="20" oninput="document.getElementById('val-stress').innerText = this.value + '%'">
                    <span id="val-stress">20%</span>
                </div>
            </div>

            <div class="section-box">
                <label style="color: hotpink;">AFFECTION</label>
                <div class="slider-wrap">
                    <input type="range" id="stat-affection" min="0" max="100" value="50" oninput="document.getElementById('val-affection').innerText = this.value + '%'">
                    <span id="val-affection">50%</span>
                </div>
            </div>

            <div class="section-box">
                <label>MODE OVERRIDE</label>
                <div class="mode-grid">
                    <button onclick="saveMode('default')">DEFAULT</button>
                    <button onclick="saveMode('busy')">BUSY</button>
                    <button onclick="saveMode('gaming')">GAMING</button>
                    <button onclick="saveMode('blogging')">BLOGGING</button>
                    <button onclick="saveMode('andy')" style="background: #333; color: #fff;">...</button>
                </div>
            </div>

            <input type="text" id="title" placeholder="Broadcast Title...">
            <textarea id="content" placeholder="What's corrupting your mind?"></textarea>

            <button id="submit-btn" onclick="publishPost()">TRANSMIT TO CORE ⚡</button>
        </div>
    </div>

    <script>
    const GITHUB_USERNAME = 'SugarHyou';
    const REPO_NAME = 'sugar0verdosed';
    const FILE_PATH = 'output/journal.json';

    function saveMode(mode) {
        localStorage.setItem('sugar_mode_request', mode);
        alert("Command Sent: " + mode.toUpperCase());
    }

    async function publishPost() {
        let GITHUB_TOKEN = localStorage.getItem('overdose_journal_token');
        if (!GITHUB_TOKEN) {
            GITHUB_TOKEN = prompt("† SYSTEM ACCESS REQUIRED † Please insert your activation key:");
            if (GITHUB_TOKEN) localStorage.setItem('overdose_journal_token', GITHUB_TOKEN.trim());
            else return;
        }

        const btn = document.getElementById('submit-btn');
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        const targetStress = parseInt(document.getElementById('stat-stress').value);
        const targetAffection = parseInt(document.getElementById('stat-affection').value);

        if (!content) return alert("Cannot transmit empty consciousness.");

        btn.innerText = "TRANSMITTING... ⚡";
        btn.disabled = true;

        const now = new Date();
        const formattedDate = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' - ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

        try {
            const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FILE_PATH}`;
            let res = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
            let sha = "";
            let dbStructure = { currentStats: { stress: targetStress, affection: targetAffection }, posts: [] };

            if (res.status === 200) {
                const fileData = await res.json();
                sha = fileData.sha;
                dbStructure = JSON.parse(decodeURIComponent(escape(atob(fileData.content.replace(/\n/g, '')))));
            }

            dbStructure.currentStats = { stress: targetStress, affection: targetAffection };
            dbStructure.posts.unshift({ date: formattedDate, title: title, content: content });

            let updateRes = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `📈 Stats & Post: ${title || 'Update'}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(dbStructure, null, 2)))),
                    sha: sha
                })
            });

            if (updateRes.status === 200 || updateRes.status === 201) {
                alert("TRANSMITTED SUCCESSFULLY! 🎀");
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
            } else {
                alert("Error writing to core.");
            }
        } catch (error) {
            alert(`Terminal Error: ${error.message}`);
        } finally {
            btn.innerText = "TRANSMIT TO CORE ⚡";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
